# -----------------------------------------------------------------------------
# Unified Portfolio Suite - CI
# Purpose: Lightweight per-project CI. Uses path filters so a change in one
# project only runs that project's checks (fast feedback, low CI cost).
# Security note: secrets are never echoed; jobs run with least-privilege tokens.
# -----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-projects:
    name: Lint & test (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - 02-security-audit-toolkit
          - 03-multi-cloud-deployment-platform
          - 04-local-ai-security-assistant
          - 05-realtime-log-analytics
          - 07-network-monitoring-suite
          - 08-security-research-ctf
          - 09-ai-powered-soc-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tooling
        run: python -m pip install --upgrade pip ruff
      - name: Lint
        working-directory: ${{ matrix.project }}
        run: ruff check . || true
      - name: Test (stdlib unittest — cores are dependency-free)
        working-directory: ${{ matrix.project }}
        run: python -m unittest discover -s tests -v

  fullstack-project:
    name: Test (Node) — Enterprise Asset Mgmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run domain tests (built-in runner, no install)
        working-directory: 01-enterprise-asset-management/backend
        run: node --test

  systems-project:
    name: Build (C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build mini-os components
        working-directory: 06-mini-os-components
        run: make && make test
