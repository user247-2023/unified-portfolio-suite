# Prometheus scrape config for the Network Monitoring Suite.
# Scrapes the collector's /metrics endpoint over the internal compose network.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: network-collector
    static_configs:
      - targets: ["collector:9100"]

