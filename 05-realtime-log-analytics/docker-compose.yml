# -----------------------------------------------------------------------------
# Real-Time Log Analytics - local stack.
# Purpose: Kafka (KRaft mode, no ZooKeeper) + ClickHouse + the Python processor.
# Security trade-off: dev defaults only; all credentials come from .env, so this
# file is safe to commit. Production would add TLS/SASL on Kafka and real auth.
# -----------------------------------------------------------------------------
services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ingest}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-logs}
    ports:
      - "8123:8123"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./processing/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  processor:
    build: ./processing
    depends_on: [kafka, clickhouse]
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      CLICKHOUSE_HOST: clickhouse

volumes:
  ch_data:
